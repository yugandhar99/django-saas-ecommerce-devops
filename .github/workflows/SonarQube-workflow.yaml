name: "sonar_cloud_scan"
# Use GitHub Actions secret for authentication
## 111${{ secrets.GITHUB_TOKEN }}5553
on:
  workflow_dispatch:
permissions:
    contents: write   

jobs:
  CodeScan-Analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
            GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
              -X
              -Dsonar.organization=yugandhar99
              -Dsonar.projectKey=yugandhar99_django-multitenant-saas-ecommerce-kubernetes
              -Dsonar.python.coverage.reportPaths=coverage.xml
              -Dsonar.verbose=true
